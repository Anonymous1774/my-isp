<!DOCTYPE html>
<html>
<head>
    <title>Test Notification Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="p-4">
        <button onclick="document.getElementById('notificationPanel').classList.remove('translate-x-full')" class="bg-red-600 text-white px-4 py-2 rounded">
            Show Notification Panel
        </button>
    </div>
    
    <!-- Notification Panel -->
    <div id="notificationPanel" class="fixed top-0 right-0 h-full w-80 bg-white shadow-xl z-30 transform translate-x-full transition-transform duration-300 ease-in-out">
        <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800">Notifications</h2>
                <button onclick="document.getElementById('notificationPanel').classList.add('translate-x-full')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        <div class="p-4">
            <p>This is a test notification panel.</p>
        </div>
    </div>
</body>
</html>
